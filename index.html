<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PalavRada 🌊</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toast"></div>

<header>
  <div class="logo">
    <span class="logo-name">PalavRada</span>
    <small><span class="logo-tagline">🌊 jogo de ondas</span></small>
    <span class="logo-compact">🌊</span>
  </div>
  <div class="header-btns">
    <div class="streak-box" id="streakBox" style="display:none">
      <span class="streak-icone">🔥</span>
      <span class="streak-texto" id="streakTexto">0 vitórias seguidas</span>
    </div>
    <div class="streak-box" id="freeBadge" style="display:none">
      <span class="streak-icone">🎯</span>
      <span class="streak-texto" id="freeBadgeTexto">0,00% completo</span>
    </div>
    <button class="hbtn" id="btnAlternarModo" title="Selecionar palavra">🎲</button>
    <button class="hbtn" id="btnConfig" title="Configurações">⚙️</button>
  </div>
</header>

<main>
  <div style="display:flex;justify-content:center;padding:2px 0">
    <div class="badge-modo diario" id="badgeModo">🌞 Desafio Diário</div>
  </div>

  <div class="wave-card">
    <div class="wave-legend">
      <span><div class="ldot" style="background:var(--wave-target)"></div>Alvo</span>
      <span><div class="ldot" style="background:var(--wave-last)"></div>Último</span>
      <span><div class="ldot" style="background:var(--wave-old)"></div>Anteriores</span>
    </div>
    <canvas id="canvasPrincipal" height="150"></canvas>
  </div>

  <div id="listaHistorico"></div>

  <div class="input-card">
    <div id="grade"></div>
    <div id="teclado"></div>
  </div>
</main>


<!-- ── Modal: Configurações ── -->
<div class="overlay" id="modalConfig">
  <div class="modal modal-config">
    <button class="modal-fechar" id="fecharConfig" title="Fechar">×</button>
    <h2>⚙️ Configurações</h2>

    <div class="cfg-secao">
      <div class="cfg-titulo">Gráfico</div>
      <div class="cfg-item">
        <label>Réguas horizontais</label>
        <button class="cfg-ciclo" id="cfgRegraH">4</button>
      </div>
      <div class="cfg-item">
        <label>Letras no eixo Y</label>
        <button class="cfg-ciclo" id="cfgEixoY">0</button>
      </div>
      <div class="cfg-item">
        <label>Bolinhas nas curvas</label>
        <button class="cfg-ciclo" id="cfgBolinhas">não</button>
      </div>
      <div class="cfg-item">
        <label>Letras no último palpite</label>
        <button class="cfg-ciclo" id="cfgLetrasGrafico">não</button>
      </div>
    </div>

    <div class="cfg-secao">
      <div class="cfg-titulo">Histórico</div>
      <div class="cfg-item">
        <label>Mostrar onda-alvo</label>
        <button class="cfg-ciclo" id="cfgAlvoMini">não</button>
      </div>
      <div class="cfg-item">
        <label>Palpites visíveis</label>
        <button class="cfg-ciclo" id="cfgMaxPalpites">6</button>
      </div>
    </div>

    <div class="cfg-secao">
      <div class="cfg-titulo">Teclado</div>
      <div class="cfg-item">
        <label>Layout</label>
        <button class="cfg-ciclo" id="cfgTeclado">QWERTY</button>
      </div>
      <div class="cfg-item">
        <label>Fixar letras certas</label>
        <button class="cfg-ciclo" id="cfgFixarLetras">não</button>
      </div>
      <div class="cfg-item">
        <label>Autocomplete</label>
        <button class="cfg-ciclo" id="cfgAutocomplete">não</button>
      </div>
    </div>
    <button class="mbtn" id="btnResetConfig" style="margin-top:16px;width:100%">Redefinir padrões</button>
  </div>
</div>


<!-- ── Modal: Resultado — Desafio Diário ── -->
<div class="overlay" id="modalResultadoDiario">
  <div class="modal">
    <button class="modal-fechar" id="fecharResultadoDiario" title="Fechar">×</button>
    <div class="res-titulo" id="resTituloDiario"></div>
    <div class="res-numero" id="resNumeroDiario">X/6</div>
    <div class="pontos-row" id="resPontosDiario"></div>
    <div class="res-label">A palavra era</div>
    <div class="res-palavra" id="resPalavraAtualDiario"></div>
    <button class="mbtn" id="btnCompartilharDiario">Compartilhar resultado</button>
    <div class="divisor"></div>
    <div class="proximo-lbl">Próxima palavra em</div>
    <div class="contagem-regressiva" id="contagemDiario">--:--:--</div>
    <button class="mbtn livre-btn" id="btnSelecionarLivreDoResultado">🎲 Jogar Modo Livre</button>
  </div>
</div>


<!-- ── Modal: Resultado — Modo Livre ── -->
<div class="overlay" id="modalResultadoLivre">
  <div class="modal">
    <button class="modal-fechar" id="fecharResultadoLivre" title="Fechar">×</button>
    <div class="res-titulo" id="resTituloLivre"></div>
    <div class="res-numero" id="resNumeroLivre">X/6</div>
    <div class="pontos-row" id="resPontosLivre"></div>
    <div class="res-label">A palavra era</div>
    <div class="res-palavra" id="resPalavraAtualLivre"></div>
    <button class="mbtn" id="btnCompartilharLivre">Compartilhar resultado</button>
    <div class="divisor"></div>
    <div class="proximo-lbl">Próxima palavra em</div>
    <div class="contagem-regressiva" id="contagemLivre">--:--:--</div>
    <button class="mbtn livre-btn" id="btnJogarOutraLivre">🎲 Jogar Modo Livre</button>
  </div>
</div>


<!-- ── Modal: Seletor de Desafios (Modo Livre) ── -->
<div class="overlay" id="modalSeletorLivre">
  <div class="modal">
    <button class="modal-fechar" id="fecharSeletorLivre" title="Fechar">×</button>
    <div class="res-titulo">Selecionar desafio no Modo Livre</div>
    <div class="grid-wrap" id="gridWrap">
      <div id="gridDesafios"></div>
      <div class="grid-fade" id="gridFade">▼</div>
    </div>
    <button class="mbtn" style="margin-top:10px;width:100%" id="btnCompartilharProgressoLivre">Compartilhar progresso</button>
  </div>
</div>


<script type="module" src="js/main.js"></script>
</body>
</html>
